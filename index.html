<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bkash Earning Pro</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bKash-pink: #e2136e;
            --dark-card: #15151a;
            --glass-border: rgba(255, 255, 255, 0.05);
            --gradient-purple: linear-gradient(135deg, #6366f1, #a855f7);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0d0d0f; color: #fff;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background: var(--bKash-pink);
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }

        .balance-chip { background: #fff; color: var(--bKash-pink); padding: 5px 12px; border-radius: 20px; font-weight: bold; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* স্ক্রিনশট অনুযায়ী প্রিমিয়াম রেফারেল ড্যাশবোর্ড */
        .refer-card {
            background: linear-gradient(180deg, #1e1e26 0%, #15151a 100%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .refer-icon {
            font-size: 50px;
            background: linear-gradient(to bottom, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .refer-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            align-items: center;
            margin-bottom: 30px;
        }

        .divider { background: rgba(255,255,255,0.1); height: 40px; }

        .stat-val { font-size: 1.8rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        .link-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            font-size: 0.75rem;
            color: #aaa;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .copy-btn {
            background: var(--gradient-purple);
            border: none; color: #fff;
            width: 100%; padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        /* অন্যান্য স্টাইল */
        .card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 18px; padding: 15px; margin-bottom: 15px; }
        .tab-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--glass-border); }
        .btn-tab { background: var(--bKash-pink); border: none; color: #fff; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; }

        nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--glass-border); }
        nav button { background: none; border: none; color: #666; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; }
        nav button.active-nav { color: #a855f7; }
        nav button i { font-size: 1.3rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight:bold;">Bkash Earning Pro</div>
        <div class="balance-chip">৳ <span id="balance">0</span></div>
    </header>

    <main>
        <div id="home" class="section active">
            <div class="card" style="background: linear-gradient(135deg, #e2136e, #8e0c45); text-align: center; padding: 25px;">
                <small>Total Balance</small>
                <h1 style="margin: 5px 0;">৳ <span id="total-earn">0</span></h1>
            </div>

            <div class="card">
                <div class="tab-row">
                    <span>অফিশিয়াল গ্রুপ</span>
                    <a href="https://t.me/+9Gb1YbLTDWJkN2Fl" target="_blank" class="btn-tab" style="background:#0088cc;">Join Group</a>
                </div>
                <div class="tab-row" style="border:none;">
                    <span>কাজ বুঝতে ভিডিও দেখুন</span>
                    <a href="https://t.me/bkash_earning_method/2" target="_blank" class="btn-tab">Watch Video</a>
                </div>
            </div>

            <h3>📺 Ad Tasks</h3>
            <div id="task-list"></div>
        </div>

        <div id="refer" class="section">
            <div class="refer-card">
                <div class="refer-icon"><i class="fas fa-users"></i></div>
                <div class="refer-title">Referral System</div>
                
                <div class="stat-grid">
                    <div>
                        <span class="stat-val" id="join-count">0</span>
                        <span class="stat-label">Total Joins</span>
                    </div>
                    <div class="divider"></div>
                    <div>
                        <span class="stat-val" style="color: #22d3ee;">৳ <span id="ref-money">0</span></span>
                        <span class="stat-label">Earnings</span>
                    </div>
                </div>

                <div class="link-box" id="refLink">
                    https://t.me/bkash_earning_pro_bot?start=loading...
                </div>

                <button class="copy-btn" onclick="copyAndShare()">লিঙ্ক কপি করুন</button>
            </div>
        </div>

        </main>

    <nav>
        <button onclick="switchSection('home', this)" class="active-nav"><i class="fas fa-home"></i>Home</button>
        <button onclick="switchSection('refer', this)"><i class="fas fa-user-plus"></i>Refer</button>
        <button onclick="switchSection('profile', this)"><i class="fas fa-user-circle"></i>Profile</button>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsEwkRTDdBtPSboIZ69UQiCvCxhXXQyzQ",
            authDomain: "bkash-earning-pro.firebaseapp.com",
            projectId: "bkash-earning-pro",
            storageBucket: "bkash-earning-pro.firebasestorage.app",
            messagingSenderId: "48884501672",
            appId: "1:48884501672:web:3d6939516c436d9f97069d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        window.onload = async () => {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                const userId = user.id.toString();
                const userSnap = await getDoc(doc(db, "users", userId));
                let data;

                if (userSnap.exists()) {
                    data = userSnap.data();
                } else {
                    data = { uid: userId, balance: 10, referCount: 0 };
                    await setDoc(doc(db, "users", userId), data);
                }

                document.getElementById('balance').innerText = data.balance;
                document.getElementById('total-earn').innerText = data.balance;
                document.getElementById('join-count').innerText = data.referCount;
                document.getElementById('ref-money').innerText = data.referCount * 30;
                document.getElementById('refLink').innerText = `https://t.me/bkash_earning_pro_bot?start=${userId}`;
            }
        };

        window.switchSection = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
        };

        window.copyAndShare = () => {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("লিঙ্ক কপি করা হয়েছে! এখন বন্ধুদের শেয়ার করুন।");
        };
    </script>
</body>
</html>
